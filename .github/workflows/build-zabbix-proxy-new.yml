name: Build Zabbix Proxy for OpenWrt 21.02.0 (ramips/mt7621)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-zabbix-proxy-new.yml

env:
  OPENWRT_VERSION: 21.02.7
  TARGET: ramips
  SUBTARGET: mt7621
  ARCH: mipsel_24kc

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3-distutils \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget

      - name: Download OpenWrt SDK
        run: |
          SDK=openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}_gcc-8.4.0_musl.Linux-x86_64
          wget -q https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/${SDK}.tar.xz
          tar xf ${SDK}.tar.xz
          mv ${SDK} openwrt-sdk

      - name: Update feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install libsqlite3-0
          ./scripts/feeds install zabbix

      - name: Patch Zabbix Makefile for SQLite3
        working-directory: openwrt-sdk
        run: |
          MAKEFILE="feeds/packages/admin/zabbix/Makefile"
          sed -i 's|$(if $(CONFIG_ZABBIX_POSTGRESQL),--with-postgresql)|--with-sqlite3=$(STAGING_DIR)/usr|g' "$MAKEFILE"
          sed -i 's/+ZABBIX_POSTGRESQL:libpq[^ ]*/+libsqlite3-0/g' "$MAKEFILE"
          sed -i 's/--enable-server/--disable-server/g' "$MAKEFILE"
          sed -i '/VARIANT:=nossl/{n; /DEFAULT_VARIANT:=1/d}' "$MAKEFILE"

      - name: Add init.d script to package
        working-directory: openwrt-sdk
        run: |
          mkdir -p feeds/packages/admin/zabbix/files
          cp "$GITHUB_WORKSPACE/zabbix_proxy.init" feeds/packages/admin/zabbix/files/zabbix_proxy.init
          python3 << 'PYEOF'
          import re
          with open('feeds/packages/admin/zabbix/Makefile', 'r') as f:
              content = f.read()
          init_lines = '\n\t$(INSTALL_DIR) $(1)/etc/init.d\n\t$(INSTALL_BIN) ./files/zabbix_proxy.init $(1)/etc/init.d/zabbix_proxy\n'
          if 'zabbix_proxy.init' not in content:
              content = re.sub(r'(define Package/zabbix-proxy/install.*?)(endef)', lambda m: m.group(1) + init_lines + m.group(2), content, flags=re.DOTALL)
          with open('feeds/packages/admin/zabbix/Makefile', 'w') as f:
              f.write(content)
          PYEOF

      - name: Compile SQLite3 dependency
        working-directory: openwrt-sdk
        run: |
          make package/feeds/packages/sqlite3/compile V=s 2>&1 | tee sqlite3.log

      - name: Configure build
        working-directory: openwrt-sdk
        run: |
          printf '%s\n' \
            'CONFIG_PACKAGE_zabbix-proxy-openssl=m' \
            '# CONFIG_PACKAGE_zabbix-proxy is not set' \
            '# CONFIG_PACKAGE_zabbix-server is not set' \
            '# CONFIG_PACKAGE_zabbix-server-openssl is not set' \
            '# CONFIG_PACKAGE_zabbix-agentd is not set' \
            > .config
          make defconfig

      - name: Build package
        working-directory: openwrt-sdk
        run: |
          make package/feeds/packages/zabbix/compile V=s 2>&1 | tee build.log
          echo "Exit code: ${PIPESTATUS[0]}"

      - name: Find built package
        if: success()
        run: |
          find openwrt-sdk/bin -name "*.ipk" | tee built-packages.txt

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: zabbix-proxy-${{ env.ARCH }}
          path: openwrt-sdk/bin/packages/${{ env.ARCH }}/packages/zabbix-proxy-*.ipk
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-log
          path: openwrt-sdk/build.log
          retention-days: 7

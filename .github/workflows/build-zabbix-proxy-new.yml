name: Build Zabbix Proxy for OpenWrt 21.02.0 (ramips/mt7621)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-zabbix-proxy-new.yml

env:
  OPENWRT_VERSION: 21.02.7
  TARGET: ramips
  SUBTARGET: mt7621
  ARCH: mipsel_24kc
  ZABBIX_VERSION: 6.0.45

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3-distutils \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget

      - name: Download OpenWrt SDK
        run: |
          SDK=openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}_gcc-8.4.0_musl.Linux-x86_64
          wget -q https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/${SDK}.tar.xz
          tar xf ${SDK}.tar.xz
          mv ${SDK} openwrt-sdk

      - name: Update feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update packages
          ./scripts/feeds install libnetsnmp libsqlite3 libpcre zlib

      - name: Copy package
        run: |
          cp -r package/zabbix-proxy openwrt-sdk/package/zabbix-proxy

      - name: Download Zabbix source and compute hash
        working-directory: openwrt-sdk
        run: |
          wget -q https://cdn.zabbix.com/zabbix/sources/stable/6.0/zabbix-${{ env.ZABBIX_VERSION }}.tar.gz
          HASH=$(sha256sum zabbix-${{ env.ZABBIX_VERSION }}.tar.gz | awk '{print $1}')
          echo "ZABBIX_HASH=${HASH}" >> $GITHUB_ENV
          # Put tarball where SDK expects it
          mkdir -p dl
          mv zabbix-${{ env.ZABBIX_VERSION }}.tar.gz dl/

      - name: Patch PKG_HASH in Makefile
        working-directory: openwrt-sdk
        run: |
          sed -i "s|PKG_HASH:=.*|PKG_HASH:=${{ env.ZABBIX_HASH }}|" package/zabbix-proxy/Makefile

      - name: Build package
        working-directory: openwrt-sdk
        run: |
          make package/zabbix-proxy/compile V=s -j$(nproc) 2>&1 | tee build.log
          echo "Exit code: ${PIPESTATUS[0]}"

      - name: Find built package
        if: success()
        run: |
          find openwrt-sdk/bin -name "*.ipk" | tee built-packages.txt

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: zabbix-proxy-${{ env.ZABBIX_VERSION }}-${{ env.ARCH }}
          path: openwrt-sdk/bin/packages/${{ env.ARCH }}/**/zabbix-proxy*.ipk
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-log
          path: openwrt-sdk/build.log
          retention-days: 7

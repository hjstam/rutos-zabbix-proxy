---
name: Build Zabbix Proxy (SQLite3 + SNMP) for RUTM30

on:
  workflow_dispatch:
    inputs:
      zabbix_version:
        description: 'Zabbix version to build'
        required: false
        default: '7.0.26'
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-zabbix-proxy.yml
      - zabbix_proxy.init

jobs:
  build:
    name: Build zabbix-proxy-openssl (mipsel_24kc)
    runs-on: ubuntu-24.04

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout repo so we can access the init script
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # 2. Install build dependencies
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential file gawk gettext git \
            libncurses5-dev libssl-dev python3 rsync unzip wget zlib1g-dev

      # -----------------------------------------------------------------------
      # 3. Download the OpenWrt 23.05.5 SDK for ramips/mt7621
      #    RutOS 7.x ships OpenSSL 3.0.x; the 21.02 SDK only has 1.1.x.
      #    23.05 ships GCC 12.3.0 + musl + OpenSSL 3.x, matching the router.
      # -----------------------------------------------------------------------
      - name: Download OpenWrt SDK
        run: |
          wget -q https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7621/openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          mv openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64 openwrt-sdk

      # -----------------------------------------------------------------------
      # 4. Update and install feeds
      # -----------------------------------------------------------------------
      - name: Update feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install libsqlite3
          ./scripts/feeds install libnetsnmp
          ./scripts/feeds install libpcre2
          ./scripts/feeds install fping
          ./scripts/feeds install zabbix

          # libpcre2 lives in the base feed, not packages — verify the symlink.
          if [ ! -d "package/feeds/base/pcre2" ]; then
            echo "ERROR: package/feeds/base/pcre2 not found after feeds install"
            ./scripts/feeds search pcre2 || true
            find feeds -maxdepth 5 -name "Makefile" | xargs grep -l "libpcre2" 2>/dev/null | head -5 || true
            exit 1
          fi
          echo "=== pcre2 feed symlink ==="
          ls -la package/feeds/base/pcre2

      # -----------------------------------------------------------------------
      # 5. Patch net-snmp Makefile to enable OpenSSL
      #    The 23.05 SDK feed has net-snmp 5.9.x matching RutOS, but the
      #    default build uses --without-openssl. We need OpenSSL so SHA-2
      #    USM auth OIDs (usmHMAC384SHA512AuthProtocol etc.) are compiled
      #    into libnetsnmp — without this Zabbix links against symbols the
      #    library doesn't define.
      # -----------------------------------------------------------------------
      - name: Replace net-snmp Makefile with openwrt-23.05 version
        working-directory: openwrt-sdk
        run: |
          # Enable OpenSSL so SHA-2 USM auth OIDs (usmHMAC384SHA512AuthProtocol
          # etc.) are compiled into libnetsnmp.a — without this Zabbix links
          # against symbols the library doesn't define.
          sed -i 's/--without-openssl/--with-openssl="$(STAGING_DIR)\/usr"/' \
            feeds/packages/net/net-snmp/Makefile

          # The openwrt-23.05 net-snmp Makefile does not list libopenssl in
          # Package/libnetsnmp DEPENDS.  Since we force --with-openssl above,
          # libnetsnmp.so links against libcrypto.so.1.1 and the packager fails
          # with "missing dependencies" unless we add +libopenssl to DEPENDS.
          sed -i '/define Package\/libnetsnmp/,/^endef/ { /DEPENDS:=/ s/$/ +libopenssl/ }' \
            feeds/packages/net/net-snmp/Makefile

          grep "^PKG_VERSION\|openssl\|DEPENDS" feeds/packages/net/net-snmp/Makefile | head -10


      # -----------------------------------------------------------------------
      # 7. Fetch the openwrt-24.10 branch Makefile (Zabbix 7.x) and patch it
      # -----------------------------------------------------------------------
      - name: Patch Zabbix Makefile for SNMP
        working-directory: openwrt-sdk
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAKEFILE="feeds/packages/admin/zabbix/Makefile"
          # Use authenticated curl — unauthenticated raw.githubusercontent.com
          # requests from Actions runners are rate-limited to 60/hr and return
          # HTTP 429, which wget reports as exit code 8 with no visible error.
          # A GITHUB_TOKEN raises the limit to 5,000/hr.
          GH_RAW_ARGS=(-fsSL -H "Authorization: Bearer $GH_TOKEN")
          GH_API_ARGS=(-fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json")

          curl "${GH_RAW_ARGS[@]}" \
            "https://raw.githubusercontent.com/openwrt/packages/openwrt-24.10/admin/zabbix/Makefile" \
            -o "$MAKEFILE"

          # The 7.x Makefile sources Config.in for kconfig symbols
          # (CONFIG_ZABBIX_NETSNMP, CONFIG_ZABBIX_SQLITE, etc.) — fetch it too.
          # Note: openwrt-24.10 only has Config.in; Config-db.in / Config-build.in
          # do not exist in that branch.
          curl "${GH_RAW_ARGS[@]}" \
            "https://raw.githubusercontent.com/openwrt/packages/openwrt-24.10/admin/zabbix/Config.in" \
            -o "feeds/packages/admin/zabbix/Config.in"

          # Replace patches: fetch from openwrt-24.10
          ZABBIX_PATCHES=$(curl "${GH_API_ARGS[@]}" \
            "https://api.github.com/repos/openwrt/packages/contents/admin/zabbix/patches?ref=openwrt-24.10" \
            | python3 -c "import sys,json; [print(f['name']) for f in json.load(sys.stdin)]")
          echo "Zabbix patches from openwrt-24.10: $ZABBIX_PATCHES"
          mkdir -p feeds/packages/admin/zabbix/patches
          rm -f feeds/packages/admin/zabbix/patches/*
          for patch in $ZABBIX_PATCHES; do
            curl "${GH_RAW_ARGS[@]}" \
              "https://raw.githubusercontent.com/openwrt/packages/openwrt-24.10/admin/zabbix/patches/$patch" \
              -o "feeds/packages/admin/zabbix/patches/$patch"
            echo "Downloaded: $patch"
          done

          # 110-reproducible-builds.patch only affects embedded build timestamps — drop it.
          rm -f feeds/packages/admin/zabbix/patches/110-reproducible-builds.patch

          ZABBIX_VERSION="${{ inputs.zabbix_version || '7.0.26' }}"
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${ZABBIX_VERSION}/" "$MAKEFILE"
          sed -i "s/PKG_HASH:=.*/PKG_HASH:=skip/" "$MAKEFILE"
          echo "Building Zabbix version: ${ZABBIX_VERSION}"

          # The 24.10 Makefile references libnetsnmp-ssl, but the 23.05 SDK feed
          # only provides libnetsnmp (which step 5 patches to enable OpenSSL).
          sed -i 's/+ZABBIX_NETSNMP:libnetsnmp-ssl/+ZABBIX_NETSNMP:libnetsnmp/g' "$MAKEFILE"
          sed -i 's/+libnetsnmp-ssl/+libnetsnmp/g' "$MAKEFILE"

          # Without an explicit path, --with-sqlite3 lets configure find the
          # HOST's /usr/include/sqlite3.h (Ubuntu has libsqlite3-dev installed),
          # adding -I/usr/include to zbxdb/ compilation.  That puts the host's
          # glibc stdio.h in the include path, which breaks cross-compilation.
          # Point explicitly at the cross-target's staged SQLite3 instead.
          sed -i 's|--with-sqlite3,--with-sqlite3="no")|--with-sqlite3="$(STAGING_DIR)/usr",--with-sqlite3="no")|' "$MAKEFILE"
          grep -q '"$(STAGING_DIR)/usr"' "$MAKEFILE" \
            && echo "sqlite3 path patched" \
            || echo "WARNING: sqlite3 path patch may have failed"

          # musl on mipsel has sys/sysinfo.h but autoconf cross-compilation may
          # not detect it — add the cached result before the first use.
          sed -i '/^MAKE_FLAGS += ARCH="linux"/i CONFIGURE_VARS += ac_cv_header_sys_sysinfo_h=yes' "$MAKEFILE"

          # --enable-year2038 is a glibc opt-in for 64-bit time_t; on musl
          # time_t is already 64-bit by default.  Keeping the flag causes the
          # cross-compiler's fortify stdio.h to fall through to the host's
          # /usr/include/stdio.h which then needs bits/libc-header-start.h —
          # a file that lives only at the multiarch path on Ubuntu 24.04.
          sed -i 's/ --enable-year2038//' "$MAKEFILE"

          echo "=== After patches ==="
          grep -n "netsnmp\|NETSNMP\|sysinfo" "$MAKEFILE" || true

          # Validate
          grep -q -- "--with-net-snmp" "$MAKEFILE" \
            || { echo "ERROR: --with-net-snmp not found in Makefile"; exit 1; }
          grep -q "libnetsnmp" "$MAKEFILE" \
            || { echo "ERROR: libnetsnmp not found in DEPENDS"; exit 1; }
          ! grep -q "libnetsnmp-ssl" "$MAKEFILE" \
            || { echo "ERROR: libnetsnmp-ssl still present in Makefile"; exit 1; }
          grep -q "ac_cv_header_sys_sysinfo_h=yes" "$MAKEFILE" \
            && echo "sysinfo fix applied" \
            || echo "WARNING: sysinfo fix not applied — build may fail on mipsel"

      # -----------------------------------------------------------------------
      # 8. Add init.d script to the Zabbix package
      # -----------------------------------------------------------------------
      - name: Add init.d script to package
        working-directory: openwrt-sdk
        run: |
          ZABBIX_DIR="feeds/packages/admin/zabbix"
          FILES_DIR="$ZABBIX_DIR/files"
          MAKEFILE="$ZABBIX_DIR/Makefile"

          mkdir -p "$FILES_DIR"
          cp "$GITHUB_WORKSPACE/zabbix_proxy.init" "$FILES_DIR/zabbix_proxy.init"

          # The openwrt-24.10 Makefile uses Package/zabbix-daemon/files to generate
          # Package/zabbix-proxy/install dynamically via $(eval $(call ...)).  A
          # top-level define appended at EOF does NOT win over the eval-generated one.
          #
          # The correct pattern (same as agentd/server) is:
          #   1. Define Package/zabbix-proxy/install-extra using $$(1) so the
          #      destination-dir argument is deferred to install time.
          #   2. Pass it as arg4 to the daemon/files macro call so it's wired into
          #      the generated Package/zabbix-proxy/install body.
          python3 << 'PYEOF'
          with open('feeds/packages/admin/zabbix/Makefile', 'r') as f:
              content = f.read()

          if 'Package/zabbix-proxy/install-extra' not in content:
              # Insert just before the server's install-extra to keep ordering tidy
              proxy_extra = (
                  'define Package/zabbix-proxy/install-extra\n'
                  '\t$(call Package/zabbix/install/etc,$$(1),proxy)\n'
                  '\t$(call Package/zabbix/install/init.d,$$(1),proxy)\n'
                  'endef\n'
                  '\n'
              )
              content = content.replace(
                  'define Package/zabbix-server/install-extra',
                  proxy_extra + 'define Package/zabbix-server/install-extra'
              )
              print("Patched: Package/zabbix-proxy/install-extra inserted")
          else:
              print("Package/zabbix-proxy/install-extra already present, skipping")

          # Wire the install-extra into the daemon/files macro call for proxy
          old_call = '$(eval $(call Package/zabbix-daemon/files,proxy))'
          new_call = '$(eval $(call Package/zabbix-daemon/files,proxy,,,$(call Package/zabbix-proxy/install-extra)))'
          if old_call in content:
              content = content.replace(old_call, new_call)
              print("Patched: daemon/files call for proxy now includes install-extra")
          elif new_call in content:
              print("daemon/files call already patched, skipping")
          else:
              print("WARNING: could not find daemon/files call for proxy")

          with open('feeds/packages/admin/zabbix/Makefile', 'w') as f:
              f.write(content)
          PYEOF

          echo "=== proxy install-extra ==="
          grep -A3 "Package/zabbix-proxy/install-extra" "$MAKEFILE" \
            || echo "WARNING: install-extra not found"
          echo "=== daemon/files proxy call ==="
          grep "Package/zabbix-daemon/files,proxy" "$MAKEFILE" \
            || echo "WARNING: daemon/files call not found"

      # -----------------------------------------------------------------------
      # 9. Configure the build — must run before compiling dependencies so
      #    .config exists when make is invoked
      # -----------------------------------------------------------------------
      - name: Configure build
        working-directory: openwrt-sdk
        run: |
          printf '%s\n' \
            'CONFIG_ZABBIX_SQLITE=y' \
            'CONFIG_ZABBIX_NETSNMP=y' \
            'CONFIG_ZABBIX_OPENSSL=y' \
            '# CONFIG_ZABBIX_LDAP is not set' \
            '# CONFIG_ZABBIX_CURL is not set' \
            '# CONFIG_ZABBIX_CURL_GNUTLS is not set' \
            '# CONFIG_ZABBIX_GNUTLS is not set' \
            '# CONFIG_ZABBIX_NOSSL is not set' \
            '# CONFIG_ZABBIX_MYSQL is not set' \
            '# CONFIG_ZABBIX_POSTGRESQL is not set' \
            'CONFIG_PACKAGE_zabbix-proxy=m' \
            'CONFIG_PACKAGE_libsqlite3=y' \
            'CONFIG_PACKAGE_libnetsnmp=y' \
            'CONFIG_PACKAGE_libpcre2=y' \
            'CONFIG_PACKAGE_zlib=y' \
            '# CONFIG_PACKAGE_zabbix-agentd is not set' \
            '# CONFIG_PACKAGE_zabbix-agentd-basic is not set' \
            '# CONFIG_PACKAGE_zabbix-get is not set' \
            '# CONFIG_PACKAGE_zabbix-sender is not set' \
            '# CONFIG_PACKAGE_zabbix-server is not set' \
            '# CONFIG_PACKAGE_zabbix-proxy-basic-sqlite is not set' \
            '# CONFIG_PACKAGE_zabbix-extra-mac80211 is not set' \
            '# CONFIG_PACKAGE_zabbix-extra-network is not set' \
            '# CONFIG_PACKAGE_zabbix-extra-wifi is not set' \
            '# CONFIG_PACKAGE_zabbix-frontend-server is not set' \
            > .config
          make defconfig
          echo "=== Zabbix config after defconfig ==="
          grep -i zabbix .config || true

      # -----------------------------------------------------------------------
      # 10. Pre-compile dependencies so their headers are in staging_dir
      #    before zabbix's configure script runs
      # -----------------------------------------------------------------------
      - name: Compile dependencies
        working-directory: openwrt-sdk
        run: |
          set -o pipefail

          make package/feeds/packages/sqlite3/compile V=s 2>&1 | tee sqlite3.log
          find staging_dir -name "sqlite3.h" 2>/dev/null | head -5 \
            && echo "sqlite3.h found in staging_dir" \
            || { echo "ERROR: sqlite3.h not found in staging_dir"; exit 1; }

          make package/feeds/base/pcre2/compile V=s 2>&1 | tee pcre2.log

          # OpenSSL must be staged before net-snmp so --with-openssl finds it
          # (no V=s — the kernel dependency it pulls in generates ~10k lines and
          # truncates the GitHub Actions log before any later failures are visible)
          make package/feeds/base/openssl/compile 2>&1 | tee openssl.log
          find staging_dir -name "libssl.a" 2>/dev/null | head -3 \
            && echo "libssl.a found in staging_dir" \
            || { echo "ERROR: libssl.a not found in staging_dir"; exit 1; }

          make package/feeds/packages/fping/compile V=s 2>&1 | tee fping.log
          find bin -name "fping*.ipk" 2>/dev/null | head -3 \
            && echo "fping .ipk built" \
            || { echo "ERROR: fping .ipk not found"; exit 1; }

          make package/feeds/packages/net-snmp/compile V=s 2>&1 | tee netsnmp.log
          find staging_dir -name "libnetsnmp.a" 2>/dev/null | head -5 \
            && echo "libnetsnmp.a found in staging_dir" \
            || { echo "ERROR: libnetsnmp.a not found in staging_dir"; exit 1; }

          # Remove shared libs so the linker is forced to use libnetsnmp.a,
          # statically linking SNMP into the zabbix_proxy binary.
          # This avoids any runtime dependency on the device's system libnetsnmp.
          find staging_dir -name "libnetsnmp*.so*" -delete
          echo "Shared libnetsnmp removed — zabbix will link statically"

      # -----------------------------------------------------------------------
      # 11. Build the package
      # -----------------------------------------------------------------------
      - name: Build zabbix-proxy-openssl
        working-directory: openwrt-sdk
        run: |
          make package/feeds/packages/zabbix/compile V=s 2>&1 | tee build.log
          echo "=== Build complete ==="

      # -----------------------------------------------------------------------
      # 12. Verify output — check init script, SQLite3 and SNMP are in the .ipk
      # -----------------------------------------------------------------------
      - name: Verify compiled package
        working-directory: openwrt-sdk
        run: |
          echo "=== Zabbix .ipk files ==="
          find bin/ -name "zabbix*.ipk" | sort

          IPK=$(find bin/ -name "zabbix-proxy*.ipk" | head -1)
          if [ -z "$IPK" ]; then
            echo "ERROR: No zabbix-proxy .ipk found"
            exit 1
          fi

          echo "=== Inspecting: $IPK ==="
          mkdir -p /tmp/ipk-check
          cp "$IPK" /tmp/ipk-check/pkg.ipk
          cd /tmp/ipk-check
          ar x pkg.ipk 2>/dev/null || tar -xzf pkg.ipk
          tar -xzf data.tar.gz 2>/dev/null || true

          echo "--- Package contents ---"
          find . -not -path "./pkg.ipk" \
                 -not -name "control.tar.gz" \
                 -not -name "data.tar.gz" \
                 -not -name "debian-binary" | sort

          echo "--- init.d script ---"
          cat ./etc/init.d/zabbix_proxy 2>/dev/null \
            && echo "init script confirmed in package" \
            || echo "WARNING: init script not found"

          echo "--- default config file ---"
          [ -f ./etc/zabbix_proxy.conf ] \
            && echo "zabbix_proxy.conf confirmed in package" \
            || echo "WARNING: zabbix_proxy.conf not found in package"

          echo "--- SQLite3 and SNMP linkage ---"
          BINARY=$(find . -name "zabbix_proxy" -not -path "*/init.d/*" | head -1)
          if [ -n "$BINARY" ]; then
            strings "$BINARY" | grep -i sqlite \
              && echo "SQLite3 confirmed" \
              || echo "WARNING: sqlite not found in binary"
            strings "$BINARY" | grep -i snmp \
              && echo "SNMP confirmed" \
              || echo "WARNING: snmp not found in binary"
          fi

      # -----------------------------------------------------------------------
      # 13. Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v6
        with:
          name: zabbix-proxy-sqlite3-snmp-mipsel_24kc
          path: |
            openwrt-sdk/bin/packages/mipsel_24kc/packages/zabbix-proxy*.ipk
            openwrt-sdk/bin/packages/mipsel_24kc/packages/fping_*.ipk
            openwrt-sdk/bin/packages/mipsel_24kc/base/libevent2*.ipk
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs
          path: |
            openwrt-sdk/build.log
            openwrt-sdk/sqlite3.log
            openwrt-sdk/pcre2.log
            openwrt-sdk/netsnmp.log
          retention-days: 7

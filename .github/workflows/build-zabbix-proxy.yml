---
name: Build Zabbix Proxy (SQLite3 + SNMP) for RUTM30

on:
  workflow_dispatch:
    inputs:
      zabbix_version:
        description: 'Zabbix version to build'
        required: false
        default: '6.0.45'
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-zabbix-proxy.yml
      - zabbix_proxy.init

jobs:
  build:
    name: Build zabbix-proxy-openssl (mipsel_24kc)
    runs-on: ubuntu-24.04

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout repo so we can access the init script
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # 2. Install build dependencies
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential file gawk gettext git \
            libncurses5-dev libssl-dev python3 rsync unzip wget zlib1g-dev

      # -----------------------------------------------------------------------
      # 3. Download the OpenWrt 23.05.5 SDK for ramips/mt7621
      #    RutOS 7.x ships OpenSSL 3.0.x; the 21.02 SDK only has 1.1.x.
      #    23.05 ships GCC 12.3.0 + musl + OpenSSL 3.x, matching the router.
      # -----------------------------------------------------------------------
      - name: Download OpenWrt SDK
        run: |
          wget -q https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7621/openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          mv openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64 openwrt-sdk

      # -----------------------------------------------------------------------
      # 4. Update and install feeds
      # -----------------------------------------------------------------------
      - name: Update feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install libsqlite3
          ./scripts/feeds install libnetsnmp
          ./scripts/feeds install libpcre2
          ./scripts/feeds install fping
          ./scripts/feeds install zabbix

          # libpcre2 lives in the base feed, not packages — verify the symlink.
          if [ ! -d "package/feeds/base/pcre2" ]; then
            echo "ERROR: package/feeds/base/pcre2 not found after feeds install"
            ./scripts/feeds search pcre2 || true
            find feeds -maxdepth 5 -name "Makefile" | xargs grep -l "libpcre2" 2>/dev/null | head -5 || true
            exit 1
          fi
          echo "=== pcre2 feed symlink ==="
          ls -la package/feeds/base/pcre2

      # -----------------------------------------------------------------------
      # 5. Patch net-snmp Makefile to enable OpenSSL
      #    The 23.05 SDK feed has net-snmp 5.9.x matching RutOS, but the
      #    default build uses --without-openssl. We need OpenSSL so SHA-2
      #    USM auth OIDs (usmHMAC384SHA512AuthProtocol etc.) are compiled
      #    into libnetsnmp — without this Zabbix links against symbols the
      #    library doesn't define.
      # -----------------------------------------------------------------------
      - name: Replace net-snmp Makefile with openwrt-23.05 version
        working-directory: openwrt-sdk
        run: |
          # Enable OpenSSL so SHA-2 USM auth OIDs (usmHMAC384SHA512AuthProtocol
          # etc.) are compiled into libnetsnmp.a — without this Zabbix links
          # against symbols the library doesn't define.
          sed -i 's/--without-openssl/--with-openssl="$(STAGING_DIR)\/usr"/' \
            feeds/packages/net/net-snmp/Makefile

          # The openwrt-23.05 net-snmp Makefile does not list libopenssl in
          # Package/libnetsnmp DEPENDS.  Since we force --with-openssl above,
          # libnetsnmp.so links against libcrypto.so.1.1 and the packager fails
          # with "missing dependencies" unless we add +libopenssl to DEPENDS.
          sed -i '/define Package\/libnetsnmp/,/^endef/ { /DEPENDS:=/ s/$/ +libopenssl/ }' \
            feeds/packages/net/net-snmp/Makefile

          grep "^PKG_VERSION\|openssl\|DEPENDS" feeds/packages/net/net-snmp/Makefile | head -10


      # -----------------------------------------------------------------------
      # 7. Fetch the openwrt-23.05 branch Makefile (Zabbix 6.x, has native
      #    SQLite3 support) and patch it for SNMP support
      # -----------------------------------------------------------------------
      - name: Patch Zabbix Makefile for SNMP
        working-directory: openwrt-sdk
        run: |
          MAKEFILE="feeds/packages/admin/zabbix/Makefile"

          wget -q \
            "https://raw.githubusercontent.com/openwrt/packages/openwrt-23.05/admin/zabbix/Makefile" \
            -O "$MAKEFILE"

          # Replace patches too: 21.02 patches target Zabbix 5.x and fail against 6.x
          ZABBIX_PATCHES=$(curl -sf \
            "https://api.github.com/repos/openwrt/packages/contents/admin/zabbix/patches?ref=openwrt-23.05" \
            | python3 -c "import sys,json; [print(f['name']) for f in json.load(sys.stdin)]")
          echo "Zabbix patches from openwrt-23.05: $ZABBIX_PATCHES"
          mkdir -p feeds/packages/admin/zabbix/patches
          rm -f feeds/packages/admin/zabbix/patches/*
          for patch in $ZABBIX_PATCHES; do
            wget -q \
              "https://raw.githubusercontent.com/openwrt/packages/openwrt-23.05/admin/zabbix/patches/$patch" \
              -O "feeds/packages/admin/zabbix/patches/$patch"
            echo "Downloaded: $patch"
          done

          ZABBIX_VERSION="${{ inputs.zabbix_version || '6.0.45' }}"
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${ZABBIX_VERSION}/" "$MAKEFILE"
          sed -i "s/PKG_HASH:=.*/PKG_HASH:=skip/" "$MAKEFILE"
          echo "Building Zabbix version: ${ZABBIX_VERSION}"

          echo "=== Before patches ==="
          grep -n "snmp\|DEFAULT_VARIANT\|libnetsnmp" "$MAKEFILE" || true

          # Add SNMP configure flag (before --with-libevent)
          sed -i 's/--with-libevent/--with-net-snmp="$(STAGING_DIR)\/usr\/bin\/net-snmp-config" \\\n\t--with-libevent/' "$MAKEFILE"

          # Add libnetsnmp to proxy Default DEPENDS
          sed -i 's/+ZABBIX_SQLITE:libsqlite3 \\/+ZABBIX_SQLITE:libsqlite3 \\\n    +libnetsnmp \\/' "$MAKEFILE"


          # Remove DEFAULT_VARIANT from nossl variants so defconfig doesn't
          # auto-enable them alongside the openssl variant we explicitly select
          sed -i '/VARIANT:=nossl/{n; /DEFAULT_VARIANT:=1/d}' "$MAKEFILE"

          echo "=== After patches ==="
          grep -n "snmp\|DEFAULT_VARIANT\|libnetsnmp" "$MAKEFILE" || true

          # Validate patches applied correctly
          grep -q -- "--with-net-snmp" "$MAKEFILE" \
            || { echo "ERROR: --with-net-snmp not found"; exit 1; }
          grep -q "libnetsnmp" "$MAKEFILE" \
            || { echo "ERROR: libnetsnmp not found in DEPENDS"; exit 1; }
          ! grep -q -- "DEFAULT_VARIANT" "$MAKEFILE" \
            || { echo "ERROR: DEFAULT_VARIANT still present"; exit 1; }

      # -----------------------------------------------------------------------
      # 8. Add init.d script to the Zabbix package
      # -----------------------------------------------------------------------
      - name: Add init.d script to package
        working-directory: openwrt-sdk
        run: |
          ZABBIX_DIR="feeds/packages/admin/zabbix"
          FILES_DIR="$ZABBIX_DIR/files"
          MAKEFILE="$ZABBIX_DIR/Makefile"

          mkdir -p "$FILES_DIR"
          cp "$GITHUB_WORKSPACE/zabbix_proxy.init" "$FILES_DIR/zabbix_proxy.init"

          python3 << 'PYEOF'
          import re

          with open('feeds/packages/admin/zabbix/Makefile', 'r') as f:
              content = f.read()

          init_lines = (
              '\n\t$(INSTALL_DIR) $(1)/etc/init.d\n'
              '\t$(INSTALL_BIN) ./files/zabbix_proxy.init $(1)/etc/init.d/zabbix_proxy\n'
          )

          if 'zabbix_proxy.init' not in content:
              content = re.sub(
                  r'(define Package/zabbix-proxy/install.*?)(endef)',
                  lambda m: m.group(1) + init_lines + m.group(2),
                  content,
                  flags=re.DOTALL
              )
              print("Patched: init script added to install section")
          else:
              print("Init script already in Makefile, skipping patch")

          with open('feeds/packages/admin/zabbix/Makefile', 'w') as f:
              f.write(content)
          PYEOF

          echo "=== Final install section ==="
          grep -A15 "Package/zabbix-proxy/install" "$MAKEFILE" || true

      # -----------------------------------------------------------------------
      # 9. Configure the build — must run before compiling dependencies so
      #    .config exists when make is invoked
      # -----------------------------------------------------------------------
      - name: Configure build
        working-directory: openwrt-sdk
        run: |
          printf '%s\n' \
            'CONFIG_ZABBIX_SQLITE=y' \
            'CONFIG_PACKAGE_zabbix-proxy-openssl=m' \
            'CONFIG_PACKAGE_libsqlite3=y' \
            'CONFIG_PACKAGE_libnetsnmp=y' \
            'CONFIG_PACKAGE_libpcre2=y' \
            'CONFIG_PACKAGE_zlib=y' \
            '# CONFIG_PACKAGE_zabbix-proxy is not set' \
            '# CONFIG_PACKAGE_zabbix-server is not set' \
            '# CONFIG_PACKAGE_zabbix-server-openssl is not set' \
            '# CONFIG_PACKAGE_zabbix-agentd is not set' \
            > .config
          make defconfig
          echo "=== Zabbix config after defconfig ==="
          grep -i zabbix .config || true

      # -----------------------------------------------------------------------
      # 10. Pre-compile dependencies so their headers are in staging_dir
      #    before zabbix's configure script runs
      # -----------------------------------------------------------------------
      - name: Compile dependencies
        working-directory: openwrt-sdk
        run: |
          set -o pipefail

          make package/feeds/packages/sqlite3/compile V=s 2>&1 | tee sqlite3.log
          find staging_dir -name "sqlite3.h" 2>/dev/null | head -5 \
            && echo "sqlite3.h found in staging_dir" \
            || { echo "ERROR: sqlite3.h not found in staging_dir"; exit 1; }

          make package/feeds/base/pcre2/compile V=s 2>&1 | tee pcre2.log

          # OpenSSL must be staged before net-snmp so --with-openssl finds it
          # (no V=s — the kernel dependency it pulls in generates ~10k lines and
          # truncates the GitHub Actions log before any later failures are visible)
          make package/feeds/base/openssl/compile 2>&1 | tee openssl.log
          find staging_dir -name "libssl.a" 2>/dev/null | head -3 \
            && echo "libssl.a found in staging_dir" \
            || { echo "ERROR: libssl.a not found in staging_dir"; exit 1; }

          make package/feeds/packages/fping/compile V=s 2>&1 | tee fping.log
          find bin -name "fping*.ipk" 2>/dev/null | head -3 \
            && echo "fping .ipk built" \
            || { echo "ERROR: fping .ipk not found"; exit 1; }

          make package/feeds/packages/net-snmp/compile V=s 2>&1 | tee netsnmp.log
          find staging_dir -name "libnetsnmp.a" 2>/dev/null | head -5 \
            && echo "libnetsnmp.a found in staging_dir" \
            || { echo "ERROR: libnetsnmp.a not found in staging_dir"; exit 1; }

          # Remove shared libs so the linker is forced to use libnetsnmp.a,
          # statically linking SNMP into the zabbix_proxy binary.
          # This avoids any runtime dependency on the device's system libnetsnmp.
          find staging_dir -name "libnetsnmp*.so*" -delete
          echo "Shared libnetsnmp removed — zabbix will link statically"

      # -----------------------------------------------------------------------
      # 11. Build the package
      # -----------------------------------------------------------------------
      - name: Build zabbix-proxy-openssl
        working-directory: openwrt-sdk
        run: |
          make package/feeds/packages/zabbix/compile V=s 2>&1 | tee build.log
          echo "=== Build complete ==="

      # -----------------------------------------------------------------------
      # 12. Verify output — check init script, SQLite3 and SNMP are in the .ipk
      # -----------------------------------------------------------------------
      - name: Verify compiled package
        working-directory: openwrt-sdk
        run: |
          echo "=== Zabbix .ipk files ==="
          find bin/ -name "zabbix*.ipk" | sort

          IPK=$(find bin/ -name "zabbix-proxy*.ipk" | head -1)
          if [ -z "$IPK" ]; then
            echo "ERROR: No zabbix-proxy .ipk found"
            exit 1
          fi

          echo "=== Inspecting: $IPK ==="
          mkdir -p /tmp/ipk-check
          cp "$IPK" /tmp/ipk-check/pkg.ipk
          cd /tmp/ipk-check
          ar x pkg.ipk 2>/dev/null || tar -xzf pkg.ipk
          tar -xzf data.tar.gz 2>/dev/null || true

          echo "--- Package contents ---"
          find . -not -path "./pkg.ipk" \
                 -not -name "control.tar.gz" \
                 -not -name "data.tar.gz" \
                 -not -name "debian-binary" | sort

          echo "--- init.d script ---"
          cat ./etc/init.d/zabbix_proxy 2>/dev/null \
            && echo "init script confirmed in package" \
            || echo "WARNING: init script not found"

          echo "--- SQLite3 and SNMP linkage ---"
          BINARY=$(find . -name "zabbix_proxy" -not -path "*/init.d/*" | head -1)
          if [ -n "$BINARY" ]; then
            strings "$BINARY" | grep -i sqlite \
              && echo "SQLite3 confirmed" \
              || echo "WARNING: sqlite not found in binary"
            strings "$BINARY" | grep -i snmp \
              && echo "SNMP confirmed" \
              || echo "WARNING: snmp not found in binary"
          fi

      # -----------------------------------------------------------------------
      # 13. Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v6
        with:
          name: zabbix-proxy-sqlite3-snmp-mipsel_24kc
          path: |
            openwrt-sdk/bin/packages/mipsel_24kc/packages/zabbix-proxy-*.ipk
            openwrt-sdk/bin/packages/mipsel_24kc/packages/fping_*.ipk
            openwrt-sdk/bin/packages/mipsel_24kc/base/libevent2*.ipk
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs
          path: |
            openwrt-sdk/build.log
            openwrt-sdk/sqlite3.log
            openwrt-sdk/pcre2.log
            openwrt-sdk/netsnmp.log
          retention-days: 7
